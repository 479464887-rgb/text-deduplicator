<!DOCTYPE html><html lang="zh-CN"><head>
<meta property="og:title" content="Text Deduplicator — DevKit">
<meta property="og:description" content="Free online Text Deduplicator tool — fast, simple, and no signup required.">
<meta property="og:type" content="website">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠</text></svg>">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="Text Deduplicator - 文本去重排序工具"><meta property="og:title" content="Text Deduplicator"><title>Text Deduplicator</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}header h1{font-size:20px;color:#58a6ff}.lang-switch{display:flex;gap:4px}.lang-switch button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}.lang-switch button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.container{max-width:1200px;margin:0 auto;padding:24px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}.btn:hover{background:#30363d}.btn-primary{background:#238636;border-color:#238636;color:#fff}.btn-primary:hover{background:#2ea043}.options{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px;font-size:13px}.options label{display:flex;align-items:center;gap:6px;cursor:pointer}.options select{background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:4px 8px;border-radius:4px;font-size:13px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:768px){.grid{grid-template-columns:1fr}}.panel{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}.panel-header{background:#21262d;padding:10px 16px;font-size:13px;font-weight:600;border-bottom:1px solid #30363d;color:#58a6ff}.panel textarea{width:100%;height:350px;background:#0d1117;color:#c9d1d9;border:none;padding:12px;font-family:monospace;font-size:13px;resize:vertical;tab-size:2}.panel textarea:focus{outline:none}.stats{padding:8px 16px;font-size:12px;color:#8b949e}</style></head><body><header><h1>📋 Text Deduplicator</h1><div class="lang-switch"><button class="active" onclick="setLang("zh")">中文</button><button onclick="setLang("en")">EN</button></div></header><div class="container"><div class="options"><label>排序 <select id="sortType" onchange="process()"><option value="none">不排序</option><option value="asc">字母升序 A-Z</option><option value="desc">字母降序 Z-A</option><option value="numAsc">数字升序</option><option value="numDesc">数字降序</option></select></label><label><input type="checkbox" id="trimLines" onchange="process()" checked> 去除首尾空格</label><label><input type="checkbox" id="ignoreCase" onchange="process()"> 忽略大小写</label><label><input type="checkbox" id="skipEmpty" onchange="process()" checked> 跳过空行</label></div><div class="toolbar"><button class="btn btn-primary" onclick="process()">🔄 去重处理</button><button class="btn" onclick="countLines()">📊 统计</button><button class="btn" onclick="copyOut()">📋 复制</button><button class="btn" onclick="clearAll()">🗑 清空</button></div><div class="grid"><div class="panel"><div class="panel-header">输入文本 (每行一条)</div><textarea id="input" placeholder="apple
banana
apple
Cherry
banana

date
eagle
date"></textarea></div><div class="panel"><div class="panel-header">去重结果</div><textarea id="output" readonly placeholder="结果..."></textarea><div class="stats" id="stats"></div></div></div></div><script>var lang="zh";function setLang(l){lang=l;document.querySelectorAll(".lang-switch button").forEach(function(b,i){b.classList.toggle("active",(i===0&&l==="zh")||(i===1&&l==="en"))})}function process(){var inp=document.getElementById("input").value;var lines=inp.split("\n");var trim=document.getElementById("trimLines").checked;var ignoreCase=document.getElementById("ignoreCase").checked;var skipEmpty=document.getElementById("skipEmpty").checked;var processed=[];lines.forEach(function(line){var l=trim?line.trim():line;if(skipEmpty&&l==="")return;processed.push(l)});var seen=new Set();var deduped=[];processed.forEach(function(line){var key=ignoreCase?line.toLowerCase():line;if(!seen.has(key)){seen.add(key);deduped.push(line)}});var sortType=document.getElementById("sortType").value;if(sortType==="asc")deduped.sort();else if(sortType==="desc"){deduped.sort();deduped.reverse()}else if(sortType==="numAsc")deduped.sort(function(a,b){return parseFloat(a)-parseFloat(b)||a.localeCompare(b)});else if(sortType==="numDesc")deduped.sort(function(a,b){return parseFloat(b)-parseFloat(a)||b.localeCompare(a)});document.getElementById("output").value=deduped.join("\n");var origCount=processed.length;var dedupCount=deduped.length;var removed=origCount-dedupCount;document.getElementById("stats").textContent="原始: "+origCount+" 行 | 去重后: "+dedupCount+" 行 | 移除: "+removed+" 行 | "+(removed>0?"缩减 "+Math.round(removed/origCount*100)+"%":"无重复")}function countLines(){var inp=document.getElementById("input").value;var lines=inp.split("\n").filter(function(l){return l.trim()});var totalChars=inp.length;var words=inp.split(/\s+/).filter(function(w){return w});alert("非空行: "+lines.length+"\n总字符: "+totalChars+"\n单词数: "+words.length)}function copyOut(){document.getElementById("output").select();document.execCommand("copy")}function clearAll(){document.getElementById("input").value="";document.getElementById("output").value="";document.getElementById("stats").textContent=""}process();</script></body></html>
